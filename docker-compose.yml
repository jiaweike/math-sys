services:
  api:
    build:
      context: ./apps/api
    container_name: mathsys-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    container_name: mathsys-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  worker:
    build:
      context: ./apps/worker
    container_name: mathsys-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./apps/worker:/app

  postgres:
    image: postgres:16
    container_name: mathsys-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: mathsys-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: mathsys-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
